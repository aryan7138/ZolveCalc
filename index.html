            static buildMatrixUI(state) {
                const container = getElement('matrixContainer');
                const tabsElement = getElement('matrixTabs');
                const panelsElement = getElement('matrixPanels');

                if (state.currentTab !== 'matrix') {
                    container.classList.remove('visible');
                    return;
                }
                container.classList.add('visible');
                state.initializeMatrices();

                // Build matrix tabs
                tabsElement.innerHTML = '';
                Object.keys(state.matrices).forEach(key => {
                    const tab = document.createElement('button');
                    tab.className = 'matrix-tab' + (key === state.activeMatrix ? ' active' : '');
                    tab.textContent = `Matrix ${key}`;
                    tab.addEventListener('click', () => {
                        if (state.matrixSaveTimeout) clearTimeout(state.matrixSaveTimeout);
                        state.saveMatrixData(state.activeMatrix);
                        state.activeMatrix = key;
                        UIComponents.buildMatrixUI(state);
                    });
                    tabsElement.appendChild(tab);

                    if (Object.keys(state.matrices).length > 2 && key !== 'A' && key !== 'B') {
                        const deleteButton = document.createElement('button');
                        deleteButton.className = 'matrix-tab delete-tab';
                        deleteButton.textContent = '×';
                        deleteButton.addEventListener('click', (event) => {
                            event.stopPropagation();
                            App.deleteMatrix(key, state);
                        });
                        tabsElement.appendChild(deleteButton);
                    }
                });

                // Add new matrix button
                const addTab = document.createElement('button');
                addTab.className = 'matrix-tab add-tab';
                addTab.textContent = '+ New';
                addTab.addEventListener('click', () => {
                    state.saveMatrixData(state.activeMatrix);
                    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                    const newKey = letters[state.matrixCounter] || 'M' + state.matrixCounter;
                    state.matrices[newKey] = { rows: 2, cols: 2, data: [[0, 0], [0, 0]] };
                    state.matrixCounter++;
                    state.activeMatrix = newKey;
                    UIComponents.buildMatrixUI(state);
                });
                tabsElement.appendChild(addTab);

                // Build matrix panel
                panelsElement.innerHTML = '';
                const matrix = state.matrices[state.activeMatrix];
                if (!matrix) return;

                const panel = document.createElement('div');
                panel.className = 'matrix-panel active';
                let html = '';
                for (let row = 0; row < matrix.rows; row++) {
                    html += '<div class="matrix-row">';
                    for (let col = 0; col < matrix.cols; col++) {
                        html += `<input class="matrix-cell matrix-data-cell" data-row="${row}" data-col="${col}" type="number" value="${matrix.data[row]?.[col] || 0}" step="any">`;
                    }
                    html += '</div>';
                }
                html += `<div class="matrix-size-control">
                    Rows:<input type="number" class="matrix-rows-input" value="${matrix.rows}" min="1" max="6">
                    Cols:<input type="number" class="matrix-cols-input" value="${matrix.cols}" min="1" max="6">
                    <button class="key-btn op-key" style="min-height:26px;padding:3px 8px;font-size:0.6rem;"><span>Resize</span></button>
                </div>`;
                panel.innerHTML = html;
                panelsElement.appendChild(panel);

                // Resize button handler
                panel.querySelector('.key-btn.op-key').addEventListener('click', () => {
                    const newRows = parseInt(panel.querySelector('.matrix-rows-input').value) || 2;
                    const newCols = parseInt(panel.querySelector('.matrix-cols-input').value) || 2;
                    App.resizeMatrix(state.activeMatrix,
                        Math.min(6, Math.max(1, newRows)),
                        Math.min(6, Math.max(1, newCols)), state);
                });

                // Input debounce
                panel.addEventListener('input', () => {
                    if (state.matrixSaveTimeout) clearTimeout(state.matrixSaveTimeout);
                    state.matrixSaveTimeout = setTimeout(() => state.saveMatrixData(state.activeMatrix), 150);
                });
            }

            static formatMatrix(array, showFractions) {
                if (!Array.isArray(array)) return DisplayManager.formatResult(array, showFractions);
                return '[' + array.map(row =>
                    '[' + row.map(value => DisplayManager.formatResult(value, showFractions)).join(',') + ']'
                ).join(';\n ') + ']';
            }
        }

        // ==================== APPLICATION CONTROLLER ====================
        class App {
            static state = new CalculatorState();

            static init() {
                UIComponents.createTabNavigation();
                UIComponents.createNumericKeypad();
                App.bindEvents();
                App.switchTab('basic');
                const stepToggle = getElement('stepToggle');
                const liveToggle = getElement('liveToggle');
                stepToggle.classList.remove('off');
                liveToggle.classList.remove('off');
            }

            static bindEvents() {
                // Tab navigation
                getElement('tabNav').addEventListener('click', (event) => {
                    const button = event.target.closest('.tab-btn');
                    if (button) App.switchTab(button.dataset.tab);
                });

                // Numeric keypad
                getElement('numericKeypad').addEventListener('click', (event) => {
                    const button = event.target.closest('button');
                    if (!button) return;
                    App.handleAction(button.dataset.action, button.dataset.value);
                });

                // Cursor navigation buttons
                getElement('cursorLeft').addEventListener('click', () => CursorManager.moveLeft(App.state));
                getElement('cursorRight').addEventListener('click', () => CursorManager.moveRight(App.state));
                getElement('cursorHome').addEventListener('click', () => CursorManager.moveHome(App.state));
                getElement('cursorEnd').addEventListener('click', () => CursorManager.moveEnd(App.state));
                getElement('cursorDel').addEventListener('click', () => CursorManager.deleteAtCursor(App.state));

                // Live toggle
                getElement('liveToggle').addEventListener('click', function() {
                    App.state.liveMode = !App.state.liveMode;
                    this.textContent = App.state.liveMode ? 'LIVE' : 'OFF';
                    this.classList.toggle('off', !App.state.liveMode);
                    if (!App.state.liveMode) {
                        getElement('displayLive').textContent = '';
                    } else {
                        App.triggerLiveEvaluation();
                    }
                });

                // Steps toggle
                getElement('stepToggle').addEventListener('click', function() {
                    App.state.showSteps = !App.state.showSteps;
                    this.textContent = App.state.showSteps ? 'STEPS' : 'OFF';
                    this.classList.toggle('off', !App.state.showSteps);
                    if (!App.state.showSteps) {
                        getElement('stepsPanel').classList.remove('visible');
                    } else if (App.state.stepsData.length > 0) {
                        DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                    }
                });

                // Fraction toggle
                getElement('fractionToggle').addEventListener('click', function() {
                    App.state.showFractions = !App.state.showFractions;
                    this.classList.toggle('active', App.state.showFractions);
                    if (App.state.lastResultValue !== null) {
                        DisplayManager.updateDisplay(App.state, false);
                    }
                    App.triggerLiveEvaluation();
                });

                // History panel
                getElement('historyPanel').addEventListener('click', (event) => {
                    const item = event.target.closest('.history-item');
                    if (!item) return;
                    const index = parseInt(item.dataset.index);
                    const entry = App.state.historyList[index];
                    if (!entry) return;
                    if (entry.tab && entry.tab !== App.state.currentTab) {
                        App.switchTab(entry.tab);
                    }
                    App.state.inputExpression = entry.expr;
                    App.state.cursorPosition = entry.expr.length;
                    App.state.lastResult = entry.value;
                    App.state.lastResultValue = entry.value;
                    DisplayManager.updateDisplay(App.state, true);
                });

                // Keyboard events
                document.addEventListener('keydown', (event) => {
                    if (event.target.tagName === 'INPUT') return;
                    const key = event.key;

                    if (key === 'ArrowLeft') {
                        event.preventDefault();
                        CursorManager.moveLeft(App.state);
                    } else if (key === 'ArrowRight') {
                        event.preventDefault();
                        CursorManager.moveRight(App.state);
                    } else if (key === 'Home') {
                        event.preventDefault();
                        CursorManager.moveHome(App.state);
                    } else if (key === 'End') {
                        event.preventDefault();
                        CursorManager.moveEnd(App.state);
                    } else if (key === 'Delete') {
                        event.preventDefault();
                        CursorManager.deleteAtCursor(App.state);
                        App.triggerLiveEvaluation();
                    } else if (key === 'Enter') {
                        event.preventDefault();
                        App.evaluateExpression();
                    } else if (key === 'Backspace') {
                        event.preventDefault();
                        CursorManager.backspaceAtCursor(App.state);
                        App.triggerLiveEvaluation();
                    } else if (key === 'Escape') {
                        event.preventDefault();
                        App.handleAction('clear');
                    } else if (/^[0-9+\-*/.^()]$/.test(key)) {
                        event.preventDefault();
                        CursorManager.insertAtCursor(App.state, key);
                        App.triggerLiveEvaluation();
                    } else if (key === 'x' || key === 'X') {
                        event.preventDefault();
                        App.smartInsert('x');
                    } else if (key === 'y' || key === 'Y') {
                        event.preventDefault();
                        App.smartInsert('y');
                    }
                });
            }

            static switchTab(tab) {
                if (App.state.isTransitioning) return;
                App.state.isTransitioning = true;

                if (App.state.currentTab === 'matrix') {
                    App.state.saveMatrixData(App.state.activeMatrix);
                }

                const appContainer = getElement('appContainer');
                const previousResult = App.state.lastResultValue;
                appContainer.style.transform = 'scale(0.94)';
                appContainer.style.opacity = '0.4';

                setTimeout(() => {
                    App.state.currentTab = tab;
                    getElement('modeIndicator').textContent = tab.toUpperCase();

                    document.querySelectorAll('.tab-btn').forEach(button => {
                        button.classList.remove('active');
                    });
                    const activeButton = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
                    if (activeButton) activeButton.classList.add('active');

                    getElement('matrixContainer').classList.toggle('visible', tab === 'matrix');
                    getElement('historyPanel').classList.toggle('visible', tab === 'history');

                    if (tab === 'matrix') UIComponents.buildMatrixUI(App.state);
                    if (tab === 'history') DisplayManager.renderHistory(App.state);

                    UIComponents.renderFunctionRow(App.state);
                    App.state.clearSteps();
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                    getElement('displayLive').textContent = '';
                    App.state.inputExpression = '';
                    App.state.cursorPosition = 0;
                    App.state.lastResultValue = previousResult;
                    DisplayManager.updateDisplay(App.state, false);

                    appContainer.style.transform = 'scale(1)';
                    appContainer.style.opacity = '1';

                    setTimeout(() => {
                        App.state.isTransitioning = false;
                    }, 500);
                }, 250);
            }

            static smartInsert(value) {
                const lastChar = App.state.inputExpression.slice(App.state.cursorPosition - 1, App.state.cursorPosition);
                if (lastChar && /[0-9)]/.test(lastChar) && /^[a-zπei]$/i.test(value)) {
                    CursorManager.insertAtCursor(App.state, '*' + value);
                } else {
                    CursorManager.insertAtCursor(App.state, value);
                }
                App.triggerLiveEvaluation();
            }

            static triggerLiveEvaluation() {
                if (App.state.liveTimer) clearTimeout(App.state.liveTimer);
                App.state.liveTimer = setTimeout(() => App.performLiveEvaluation(), 120);
            }

            static performLiveEvaluation() {
                const liveElement = getElement('displayLive');
                if (!App.state.liveMode || !App.state.inputExpression.trim()) {
                    liveElement.textContent = '';
                    return;
                }
                if (['matrix', 'vector'].includes(App.state.currentTab)) {
                    liveElement.textContent = '';
                    return;
                }
                try {
                    const result = MathEngine.evaluate(App.state.inputExpression, App.state);
                    if ((typeof result === 'number' && !isNaN(result) && isFinite(result)) || MathEngine.isComplex(result)) {
                        liveElement.textContent = '≈ ' + DisplayManager.formatResult(result, App.state.showFractions);
                    } else {
                        liveElement.textContent = '';
                    }
                } catch (error) {
                    liveElement.textContent = '';
                }
            }

            static evaluateExpression() {
                if (!App.state.inputExpression.trim()) return;
                App.state.clearSteps();
                const expression = App.state.inputExpression.trim();

                if (App.state.currentTab === 'basen') {
                    App.performBaseConversion();
                    return;
                }

                try {
                    App.state.addStep('Input:', expression);
                    const result = MathEngine.evaluate(expression, App.state);

                    if (typeof result === 'number' && (isNaN(result) || !isFinite(result))) {
                        App.state.addStep('Result:', 'Undefined 📚', true);
                        DisplayManager.updateDisplay(App.state, false);
                        App.state.lastResultValue = NaN;
                    } else {
                        App.state.addStep('Result:', DisplayManager.formatResult(result, App.state.showFractions));
                        App.state.lastResult = result;
                        App.state.lastResultValue = result;
                        DisplayManager.updateDisplay(App.state, false);
                    }

                    App.state.addToHistory(expression, result);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    const friendlyMessage = error.message.includes('divide by zero')
                        ? 'Cannot divide by zero 📚'
                        : error.message.includes('Syntax')
                            ? 'Check brackets or operators 🤔'
                            : error.message;
                    DisplayManager.updateDisplay(App.state, false);
                    App.state.addStep('Error:', friendlyMessage, true);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                }
            }

            static solveEquation() {
                const expression = App.state.inputExpression.trim();
                if (!expression.includes('=')) {
                    DisplayManager.showToast('Use = sign: 2x+3=9 ✏️');
                    return;
                }

                App.state.clearSteps();
                App.state.addStep('Equation:', expression);

                const parts = expression.split('=');
                const leftPart = MathEngine.addImplicitMultiplication(parts[0].trim());
                const rightPart = MathEngine.addImplicitMultiplication(parts[1].trim());
                const equation = `(${leftPart})-(${rightPart})`;
                App.state.addStep('Rearrange:', equation + ' = 0');

                try {
                    const simplified = math.simplify(equation).toString();
                    App.state.addStep('Simplify:', simplified + ' = 0');
                    const variable = expression.includes('x') ? 'x' : (expression.includes('y') ? 'y' : 'z');

                    if (MathEngine.isQuadratic(simplified, variable)) {
                        App.solveQuadratic(simplified, variable, expression);
                    } else {
                        App.solveLinear(simplified, variable, expression);
                    }

                    App.state.addToHistory(expression, App.state.lastResultValue);
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    App.solveNumerically(equation, expression);
                }
            }

            static solveQuadratic(simplified, variable, expression) {
                const a = MathEngine.extractCoefficient(simplified, variable, 2);
                const b = MathEngine.extractCoefficient(simplified, variable, 1);
                const c = MathEngine.extractCoefficient(simplified, variable, 0);

                App.state.addStep('Quadratic coefficients:',
                    `a=${DisplayManager.formatResult(a)}, b=${DisplayManager.formatResult(b)}, c=${DisplayManager.formatResult(c)}`);

                const discriminant = b * b - 4 * a * c;
                App.state.addStep('Discriminant:', `Δ = ${DisplayManager.formatResult(discriminant)}`);

                if (discriminant >= 0) {
                    const sqrtD = Math.sqrt(discriminant);
                    const x1 = (-b + sqrtD) / (2 * a);
                    const x2 = (-b - sqrtD) / (2 * a);

                    if (Math.abs(x1 - x2) < 1e-10) {
                        App.state.addStep('Double root:', `${variable} = ${DisplayManager.formatResult(x1)}`);
                        App.state.lastResultValue = x1;
                        DisplayManager.updateDisplay(App.state, false);
                    } else {
                        App.state.addStep('Two roots:',
                            `${variable}₁ = ${DisplayManager.formatResult(x1)}, ${variable}₂ = ${DisplayManager.formatResult(x2)}`);
                        App.state.lastResultValue = [x1, x2];
                        DisplayManager.updateDisplay(App.state, false);
                    }
                } else {
                    const realPart = -b / (2 * a);
                    const imagPart = Math.sqrt(-discriminant) / (2 * a);
                    App.state.addStep('Complex roots:',
                        `${variable} = ${DisplayManager.formatResult(realPart)} ± ${DisplayManager.formatResult(imagPart)}i`);
                    App.state.lastResultValue = `${DisplayManager.formatResult(realPart)} ± ${DisplayManager.formatResult(imagPart)}i`;
                    DisplayManager.updateDisplay(App.state, false);
                }
            }

            static solveLinear(simplified, variable, expression) {
                try {
                    const a = MathEngine.extractCoefficient(simplified, variable, 1);
                    const b = MathEngine.extractCoefficient(simplified, variable, 0);
                    App.state.addStep('Linear form:',
                        `${DisplayManager.formatResult(a)}${variable} + ${DisplayManager.formatResult(b)} = 0`);

                    if (Math.abs(a) < 1e-12) {
                        if (Math.abs(b) < 1e-12) {
                            DisplayManager.updateDisplay(App.state, false);
                            App.state.addStep('Result:', 'Infinite solutions (identity)');
                        } else {
                            DisplayManager.updateDisplay(App.state, false);
                            App.state.addStep('Result:', 'No solution');
                        }
                    } else {
                        const x = -b / a;
                        App.state.addStep('Result:', `${variable} = ${DisplayManager.formatResult(x)}`);
                        App.state.lastResultValue = x;
                        DisplayManager.updateDisplay(App.state, false);
                    }
                } catch (error) {
                    App.solveNumerically(simplified, expression);
                }
            }

            static solveNumerically(equation, expression) {
                App.state.addStep('Newton-Raphson method:', 'Using iterative approximation 🔄');
                const variable = expression.includes('x') ? 'x' : (expression.includes('y') ? 'y' : 'x');
                const guesses = [1, -1, 0.5, 2, -2, 10, -10];
                let bestRoot = null;

                for (const guess of guesses) {
                    const root = MathEngine.newtonRaphson(equation, variable, guess);
                    if (root !== null) {
                        bestRoot = root;
                        break;
                    }
                }

                if (bestRoot !== null) {
                    App.state.addStep('Approximate root:', `${variable} ≈ ${DisplayManager.formatResult(bestRoot)}`);
                    App.state.lastResultValue = bestRoot;
                    App.state.addToHistory(expression, bestRoot);
                } else {
                    App.state.addStep('Error:', 'Could not find a solution 🔍', true);
                }
                DisplayManager.updateDisplay(App.state, false);
                DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
            }

            static performBaseConversion() {
                App.state.clearSteps();
                const expression = App.state.inputExpression.trim();

                try {
                    let inputString = expression;
                    let fromBase = App.state.baseNMode;
                    const parts = expression.split(/\s+/);

                    if (parts.length >= 2 && !isNaN(parts[1])) {
                        fromBase = parseInt(parts[1]);
                        inputString = parts[0];
                    }

                    inputString = inputString.replace(/\s/g, '');
                    if (fromBase === 10) {
                        const detected = MathEngine.detectBase(inputString);
                        if (detected !== 10) {
                            fromBase = detected;
                            App.state.baseNMode = detected;
                            getElement('modeIndicator').textContent = 'BASE-N';
                        }
                    }

                    if (!MathEngine.isValidForBase(inputString, fromBase)) {
                        throw new Error('Invalid digits for this base');
                    }

                    App.state.addStep('Input:', `${inputString} (base ${fromBase})`);
                    const decimal = parseInt(inputString, fromBase);
                    App.state.addStep('Decimal:', decimal.toString());

                    let result = '';
                    [2, 8, 10, 16].forEach(base => {
                        const converted = decimal.toString(base).toUpperCase();
                        const label = base === 2 ? 'BIN' : base === 8 ? 'OCT' : base === 10 ? 'DEC' : 'HEX';
                        App.state.addStep(label + ':', converted);
                        result += `${label}:${converted} `;
                    });

                    App.state.lastResultValue = result.trim();
                    App.state.addToHistory('convert(' + expression + ')', result.trim());
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    DisplayManager.showToast(error.message);
                }
            }

            static performCustomBaseConversion() {
                if (!App.state.inputExpression.trim()) return;
                App.state.clearSteps();
                const expression = App.state.inputExpression.trim();

                try {
                    let inputString = expression;
                    let fromBase = App.state.customBaseFrom;
                    let toBase = App.state.customBaseTo;
                    const parts = expression.split(/\s+/);

                    if (parts.length >= 3 && !isNaN(parts[1]) && !isNaN(parts[2])) {
                        inputString = parts[0];
                        fromBase = parseInt(parts[1]);
                        toBase = parseInt(parts[2]);
                    } else if (parts.length >= 2 && !isNaN(parts[1])) {
                        fromBase = parseInt(parts[1]);
                        inputString = parts[0];
                    }

                    if (fromBase === 10 && /[A-Fa-f]/.test(inputString)) {
                        fromBase = MathEngine.detectBase(inputString);
                    }

                    if (fromBase < 2 || fromBase > 36 || toBase < 2 || toBase > 36) {
                        throw new Error('Base must be between 2 and 36 📐');
                    }

                    inputString = inputString.replace(/\s/g, '').toUpperCase();
                    if (!MathEngine.isValidForBase(inputString, fromBase)) {
                        throw new Error(`Invalid digits for base ${fromBase} 🔢`);
                    }

                    App.state.addStep('Input:', `${inputString} (base ${fromBase})`);
                    const decimal = parseInt(inputString, fromBase);
                    App.state.addStep('Decimal:', decimal.toString());
                    const converted = decimal.toString(toBase).toUpperCase();
                    App.state.addStep(`Base ${toBase}:`, converted);

                    App.state.lastResultValue = converted;
                    App.state.addToHistory('convert(' + expression + ')', converted);
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    DisplayManager.showToast(error.message);
                }
            }

            static performMatrixOperation(operation) {
                App.state.saveMatrixData('A');
                App.state.saveMatrixData('B');
                const matrixA = App.state.matrices['A'].data;
                const matrixB = App.state.matrices['B'].data;
                App.state.clearSteps();

                try {
                    const mathMatrixA = math.matrix(matrixA);
                    const mathMatrixB = math.matrix(matrixB);
                    let result;

                    if (operation === 'add') result = math.add(mathMatrixA, mathMatrixB);
                    else if (operation === 'sub') result = math.subtract(mathMatrixA, mathMatrixB);
                    else if (operation === 'mul') result = math.multiply(mathMatrixA, mathMatrixB);

                    const resultArray = result.toArray();
                    App.state.addStep('Result:', UIComponents.formatMatrix(resultArray, App.state.showFractions));
                    App.state.lastResultValue = resultArray;
                    App.state.addToHistory(operation + ' matrices', resultArray);
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    DisplayManager.showToast('Matrix dimensions do not match 📐');

            }

            static performMatrixInverse() {
                App.state.saveMatrixData(App.state.activeMatrix);
                const matrixData = App.state.matrices[App.state.activeMatrix].data;
                App.state.clearSteps();

                try {
                    if (matrixData.length !== matrixData[0].length) throw new Error('Matrix must be square');
                    const inverse = math.inv(math.matrix(matrixData)).toArray();
                    App.state.addStep(`${App.state.activeMatrix}⁻¹:`,

                    App.state.lastResultValue = inverse;
                    App.state.matrices[App.state.activeMatrix].data = inverse;
                    App.state.matrices[App.state.activeMatrix].rows = inverse.length;

                    App.state.addToHistory('inv(' + App.state.activeMatrix + ')', inverse);
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {

            static performMatrixSolve() {
                App.state.saveMatrixData(App.state.activeMatrix);
                const allKeys = Object.keys(App.state.matrices);
                if (allKeys.length < 2) {
                    DisplayManager.showToast('Need at least 2 matrices');
                    return;
                }
                const bKey = allKeys.filter(key => key !== App.state.activeMatrix)[0] || allKeys[0];
                App.state.saveMatrixData(bKey);
                const matrixA = App.state.matrices[App.state.activeMatrix].data;
                const matrixB = App.state.matrices[bKey].data;
                App.state.clearSteps();

                try {
                    if (matrixA.length !== matrixA[0].length) throw new Error('Matrix A must be square');
                    const solution = math.multiply(math.inv(math.matrix(matrixA)), math.matrix(matrixB)).toArray();
                    App.state.addStep('Solution x =', UIComponents.formatMatrix(solution, App.state.showFractions));
                    App.state.lastResultValue = solution;
                    App.state.addToHistory('solve ' + App.state.activeMatrix + 'x=' + bKey, solution);
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    DisplayManager.showToast('Matrix is singular (determinant = 0) 🚫');
                }
            }

            static deleteMatrix(key, state) {
                if (key === 'A' || key === 'B') {
                    DisplayManager.showToast('Cannot delete Matrix A or B');
                    return;
                }
                delete state.matrices[key];
                if (state.activeMatrix === key) state.activeMatrix = 'A';
                UIComponents.buildMatrixUI(state);
            }

            static resizeMatrix(key, rows, cols, state) {
                state.saveMatrixData(key);
                const matrix = state.matrices[key];
                const newData = [];
                for (let row = 0; row < rows; row++) {
                    newData[row] = [];
                    for (let col = 0; col < cols; col++) {
                        newData[row][col] = (matrix.data[row] && matrix.data[row][col] !== undefined)
                            ? matrix.data[row][col] : 0;
                    }
                }
                matrix.rows = rows;
                matrix.cols = cols;
                matrix.data = newData;
                UIComponents.buildMatrixUI(state);
            }

            static parseVectorInput() {
                const text = App.state.inputExpression.trim();
                return text.split(/\s*;\s*/).map(vectorString => {
                    const cleaned = vectorString.replace(/[\[\]]/g, '').split(',').map(s => parseFloat(s.trim()));
                    return cleaned.filter(n => !isNaN(n));
                }).filter(array => array.length >= 2);
            }

            static performVectorOperation(operation) {
                const vectors = App.parseVectorInput();
                if (vectors.length < 2) {
                    DisplayManager.showToast('Use format: [1,2]; [3,4] 📝');
                    return;
                }
                const vector1 = [...vectors[0]];
                const vector2 = [...vectors[1]];
                const maxLength = Math.max(vector1.length, vector2.length);
                while (vector1.length < maxLength) vector1.push(0);
                while (vector2.length < maxLength) vector2.push(0);

                App.state.clearSteps();
                const result = operation === 'add'
                    ? vector1.map((n, i) => n + vector2[i])
                    : vector1.map((n, i) => n - vector2[i]);

                App.state.addStep(`v1 ${operation === 'add' ? '+' : '−'} v2 (padded):`,
                    DisplayManager.formatResult(result));
                App.state.lastResultValue = result;
                App.state.addToHistory(operation + ' vectors', result);
                DisplayManager.updateDisplay(App.state, false);
                DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
            }

            static performVectorDotProduct() {
                const vectors = App.parseVectorInput();
                if (vectors.length < 2) {
                    DisplayManager.showToast('Use format: [1,2]; [3,4] 📝');
                    return;
                }
                const maxLength = Math.max(vectors[0].length, vectors[1].length);
                let dotProduct = 0;
                for (let i = 0; i < maxLength; i++) {
                    dotProduct += (vectors[0][i] || 0) * (vectors[1][i] || 0);
                }
                App.state.clearSteps();
                App.state.addStep('v1 · v2:', DisplayManager.formatResult(dotProduct));
                App.state.lastResultValue = dotProduct;
                App.state.addToHistory('dot product', dotProduct);
                DisplayManager.updateDisplay(App.state, false);
                DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
            }

            static performVectorCrossProduct() {
                const vectors = App.parseVectorInput();
                if (vectors.length < 2 || vectors[0].length < 3 || vectors[1].length < 3) {
                    DisplayManager.showToast('Need 3D vectors: [1,2,3]; [4,5,6] 📐');
                    return;
                }
                const [v1, v2] = vectors;
                const result = [
                    v1[1] * v2[2] - v1[2] * v2[1],
                    v1[2] * v2[0] - v1[0] * v2[2],
                    v1[0] * v2[1] - v1[1] * v2[0]
                ];
                App.state.clearSteps();
                App.state.addStep('v1 × v2:', DisplayManager.formatResult(result));
                App.state.lastResultValue = result;
                App.state.addToHistory('cross product', result);
                DisplayManager.updateDisplay(App.state, false);
                DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
            }

            static performVectorMagnitude() {
                const vectors = App.parseVectorInput();
                if (vectors.length < 1) {
                    DisplayManager.showToast('Use format: [3,4] 📝');
                    return;
                }
                const magnitude = Math.sqrt(vectors[0].reduce((sum, n) => sum + n * n, 0));
                App.state.clearSteps();
                App.state.addStep('|v|:', DisplayManager.formatResult(magnitude));
                App.state.lastResultValue = magnitude;
                App.state.addToHistory('magnitude', magnitude);
                DisplayManager.updateDisplay(App.state, false);
                DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
            }

            static performVectorUnit() {
                const vectors = App.parseVectorInput();
                if (vectors.length < 1) {
                    DisplayManager.showToast('Use format: [3,4] 📝');
                    return;
                }
                const magnitude = Math.sqrt(vectors[0].reduce((sum, n) => sum + n * n, 0));
                if (magnitude === 0) {
                    DisplayManager.showToast('Zero vector has no unit vector 🚫');
                    return;
                }
                const unitVector = vectors[0].map(n => n / magnitude);
                App.state.clearSteps();
                App.state.addStep('Unit vector:', DisplayManager.formatResult(unitVector));
                App.state.lastResultValue = unitVector;
                App.state.addToHistory('unit vector', unitVector);
                DisplayManager.updateDisplay(App.state, false);
                DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
            }

            static performSolveSystem() {
                if (!App.state.inputExpression.trim()) return;
                App.state.clearSteps();
                const expression = App.state.inputExpression.trim();
                const equations = expression.split(',').map(s => s.trim()).filter(s => s.includes('='));

                if (equations.length < 2) {
                    DisplayManager.showToast('Need 2+ equations separated by commas ✏️\nExample: 2x+y=7, x-y=1');
                    return;
                }

                try {
                    App.state.addStep('System of equations:', expression);
                    const variables = [];
                    if (expression.includes('x')) variables.push('x');
                    if (expression.includes('y')) variables.push('y');
                    if (expression.includes('z')) variables.push('z');
                    if (variables.length < 2) variables.push('x', 'y');

                    const coefficients = [];
                    const constants = [];

                    for (const equation of equations.slice(0, variables.length)) {
                        const parts = equation.split('=');
                        const leftSide = MathEngine.addImplicitMultiplication(parts[0].trim());
                        let rightValue = 0;
                        try {
                            rightValue = math.evaluate(
                                MathEngine.addImplicitMultiplication(
                                    parts[1].trim().replace(new RegExp(variables.join('|'), 'g'), '0')
                                )
                            );
                        } catch (e) {
                            rightValue = parseFloat(parts[1]) || 0;
                        }
                        const row = variables.map(v => App.extractCoefficientFromEquation(leftSide, v, variables));
                        coefficients.push(row);
                        constants.push([rightValue - App.evaluateConstant(leftSide, variables)]);
                    }

                    App.state.addStep('Coefficient matrix:',
                        UIComponents.formatMatrix(coefficients, App.state.showFractions));
                    const solution = math.multiply(
                        math.inv(math.matrix(coefficients)),
                        math.matrix(constants)
                    ).toArray();

                    const solutionString = variables.map((v, i) =>
                        `${v} = ${DisplayManager.formatResult(solution[i][0])}`
                    ).join(', ');

                    App.state.addStep('Solution:', solutionString);
                    App.state.lastResultValue = solutionString;
                    App.state.addToHistory(expression, solutionString);
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    DisplayManager.showToast('Could not solve this system 🔍');
                }
            }

            static extractCoefficientFromEquation(equation, variable, allVariables) {
                try {
                    let normalized = MathEngine.addImplicitMultiplication(equation);
                    let withVariable = normalized;
                    allVariables.forEach(v => {
                        withVariable = withVariable.replace(
                            new RegExp(v, 'g'), v === variable ? '(1)' : '0'
                        );
                    });
                    withVariable = withVariable.replace(/\^/g, '^');
                    withVariable = withVariable.replace(/\(1\)/g, '(1)').replace(/(\d)\(1\)/g, '$1*(1)');
                    const withValue = math.evaluate(withVariable);

                    let withoutVariable = normalized;
                    allVariables.forEach(v => {
                        withoutVariable = withoutVariable.replace(new RegExp(v, 'g'), '0');
                    });
                    withoutVariable = withoutVariable.replace(/\^/g, '^');
                    const withoutValue = math.evaluate(withoutVariable);

                    return withValue - withoutValue;
                } catch (error) {
                    return 0;
                }
            }

            static evaluateConstant(equation, allVariables) {
                try {
                    let cleaned = MathEngine.addImplicitMultiplication(equation);
                    allVariables.forEach(v => {
                        cleaned = cleaned.replace(new RegExp(v + '(\\^\\d+)?', 'g'), '0');
                    });
                    cleaned = cleaned.replace(/\^/g, '^');
                    return math.evaluate(cleaned);
                } catch (error) {
                    return 0;
                }
            }

            static evaluateCalculus() {
                if (!App.state.inputExpression.trim()) return;
                App.state.clearSteps();
                let expression = MathEngine.addImplicitMultiplication(App.state.inputExpression.trim());

                if (App.state.lastResultValue !== null && typeof App.state.lastResultValue === 'number') {
                    expression = expression.replace(/ans/g, App.state.lastResultValue.toString());
                }

                try {
                    App.state.addStep('Input:', expression);

                    if (expression.startsWith('diff(')) {
                        const inner = expression.slice(5, -1);
                        const derivative = math.derivative(inner, 'x');
                        const result = math.simplify(derivative).toString();
                        App.state.addStep('Derivative:', result);
                        App.state.lastResultValue = result;
                    } else if (expression.startsWith('integrate(')) {
                        const inner = expression.slice(10, -1);
                        const lastComma = inner.lastIndexOf(',');
                        const secondLastComma = inner.lastIndexOf(',', lastComma - 1);

                        if (lastComma > 0 && secondLastComma > 0) {
                            const functionStr = inner.substring(0, secondLastComma).trim();
                            let lower = inner.substring(secondLastComma + 1, lastComma).trim();
                            let upper = inner.substring(lastComma + 1).trim();
                            if (lower === 'pi') lower = Math.PI; else lower = parseFloat(lower);
                            if (upper === 'pi') upper = Math.PI; else upper = parseFloat(upper);

                            if (!isNaN(lower) && !isNaN(upper)) {
                                const compiledFunction = math.compile(functionStr);
                                const steps = 2000;
                                const stepSize = (upper - lower) / steps;
                                let sum = compiledFunction.evaluate({ x: lower }) + compiledFunction.evaluate({ x: upper });
                                for (let i = 1; i < steps; i++) {
                                    sum += (i % 2 ? 4 : 2) * compiledFunction.evaluate({ x: lower + i * stepSize });
                                }
                                const result = (stepSize / 3) * sum;
                                App.state.addStep('Definite integral:', DisplayManager.formatResult(result));
                                App.state.lastResultValue = result;
                            }
                        } else {
                            const functionStr = inner.split(',')[0].trim();
                            const integrated = MathEngine.simpleIntegrate(functionStr);
                            if (integrated) {
                                App.state.addStep('Indefinite integral:', integrated);
                                App.state.lastResultValue = integrated;
                            }
                        }
                    } else if (expression.startsWith('limit(')) {
                        const result = math.evaluate(MathEngine.addImplicitMultiplication(expression));
                        App.state.addStep('Limit:', DisplayManager.formatResult(result));
                        App.state.lastResultValue = result;
                    } else {
                        App.evaluateExpression();
                        return;
                    }

                    if (App.state.lastResultValue !== null) {
                        App.state.addToHistory(expression, App.state.lastResultValue);
                    }
                    DisplayManager.updateDisplay(App.state, false);
                    DisplayManager.renderSteps(App.state.stepsData, App.state.showSteps);
                } catch (error) {
                    DisplayManager.showToast('Could not evaluate this expression 💡');
                }
            }

            static performSimplify() {

                try {

            static handleAction(action, value) {
                switch (action) {
                    case 'clear':
                        App.state.inputExpression = '';
                        App.state.cursorPosition = 0;
                        App.state.lastResult = null;
                        App.state.lastResultValue = null;
                        App.state.clearSteps();
                        DisplayManager.updateDisplay(App.state, false);
                        getElement('displayLive').textContent = '';
                        break;

                    case 'backspace':
                        CursorManager.backspaceAtCursor(App.state);
                        App.triggerLiveEvaluation();
                        break;

                    case 'symbol':
                        CursorManager.insertAtCursor(App.state, value || '');
                        App.triggerLiveEvaluation();
                        break;

                    case 'evaluate':
                        App.evaluateExpression();
                        break;

                    case 'evaluateCalculus':
                        App.evaluateCalculus();
                        break;

                    case 'simplify':
                        App.performSimplify();
                        break;

                    case 'expand':
                        App.performExpand();
                        break;

                    case 'solveEquation':
                        App.solveEquation();
                        break;

                    case 'toggleTrigMode':
                        App.state.trigMode = App.state.trigMode === 'deg' ? 'rad' : 'deg';
                        DisplayManager.showToast(`Trig mode: ${App.state.trigMode.toUpperCase()}`);
                        UIComponents.renderFunctionRow(App.state);
                        App.triggerLiveEvaluation();
                        break;

                    case 'matrixAdd':
                        App.performMatrixOperation('add');
                        break;

                    case 'matrixSub':
                        App.performMatrixOperation('sub');
                        break;

                    case 'matrixMul':
                        App.performMatrixOperation('mul');
                        break;

                    case 'matrixDet':
                        App.performMatrixDeterminant();
                        break;

                    case 'matrixInv':
                        App.performMatrixInverse();
                        break;

                    case 'matrixTranspose':
                        App.performMatrixTranspose();
                        break;

                    case 'matrixSolve':
                        App.performMatrixSolve();
                        break;

                    case 'vectorAdd':
                        App.performVectorOperation('add');
                        break;

                    case 'vectorSub':
                        App.performVectorOperation('sub');
                        break;

                    case 'vectorDot':
                        App.performVectorDotProduct();
                        break;

                    case 'vectorCross':
                        App.performVectorCrossProduct();
                        break;

                    case 'vectorMag':
                        App.performVectorMagnitude();
                        break;

                    case 'vectorUnit':
                        App.performVectorUnit();
                        break;

                    case 'setBase':
                        App.state.baseNMode = value;
                        getElement('modeIndicator').textContent = 'BASE-N';
                        DisplayManager.showToast(`Base: ${value}`);
                        break;

                    case 'bitwiseOp':
                        CursorManager.insertAtCursor(App.state, ` ${value} `);
                        App.triggerLiveEvaluation();
                        break;

                    case 'bitwiseNot':
                        App.state.inputExpression = `~(${App.state.inputExpression})`;
                        App.state.cursorPosition = App.state.inputExpression.length;
                        DisplayManager.updateDisplay(App.state, true);
                        break;

                    case 'baseConvertFull':
                        App.performBaseConversion();
                        break;

                    case 'customBaseConvert':
                        App.performCustomBaseConversion();
                        break;

                    case 'solveSystem':
                        App.performSolveSystem();
                        break;

                    case 'clearHistory':
                        App.state.historyList = [];
                        DisplayManager.renderHistory(App.state);
                        DisplayManager.showToast('History cleared');
                        break;

                    case 'useAns':
                        if (App.state.lastResultValue !== null) {
                            CursorManager.insertAtCursor(
                                App.state,
                                DisplayManager.formatResult(App.state.lastResultValue, App.state.showFractions)
                            );
                            App.triggerLiveEvaluation();
                        }
                        break;
                }
            }
        }

        // ==================== BOOTSTRAP ====================
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>
</html>
